# remap prefix from C-b to C-a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# open new windows and split panes in the current directory
bind c new-window -c "#{pane_current_path}"

# split panes using | and -
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# navigate windows forward w space and back with backspace
bind-key space next-window
bind-key bspace previous-window

# reload config file using r
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded config!"

# Session tree: only allow instant one-key jump for the first 10 sessions,
# numbered 1-9 then 0 (like OS window-switcher shortcuts) rather than 0-9.
# Past row 10, #{line} renders as a multi-digit string which isn't a valid
# single key, so tmux can't bind it -- those rows need j/k/arrows + Enter
# instead. Prevents the "cmd+a+s" (prefix+s) picker from landing on a fixed
# session via an accidental letter keystroke once there are >10 sessions.
bind-key -T prefix s choose-tree -Zs -K '#{?#{<:#{line},9},#{e|+:#{line},1},#{?#{==:#{line},9},0,}}'

# mouse
set -g mouse on

# window numbering - set the lowest val to 1 (for keyboard ergonomics) and
# renumber windows as they leave/close
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# don't terminate if one session is terminated but there are others
set -g detach-on-destroy off

# clear the attention-needed marker (see claude/hooks/tmux-flag-attention.sh)
# on any window you actually switch into
set-hook -g after-select-window 'run-shell "~/.config/tmux/tmux-clear-flag.sh \"#{session_name}:#{window_index}\""'
set-hook -g client-session-changed 'run-shell "~/.config/tmux/tmux-clear-flag.sh \"#{session_name}:#{window_index}\""'

# show which sessions have a flagged (needs-attention) window in the status bar
set -g status-interval 5
set -g status-right "#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}\"#{=21:pane_title}\" #(~/.config/tmux/tmux-attention-summary.sh)"

# local overrides
if-shell "test -f ~/.config/tmux/local_overrides.conf" "source-file ~/.config/tmux/local_overrides.conf"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'                   # tpm itself
set -g @plugin 'tmux-plugins/tmux-sensible'         # basic tmux settings
set -g @plugin 'christoomey/vim-tmux-navigator'     # vim x tmux integration

# init tmux plugin manager (must be last line)
run '~/.tmux/plugins/tpm/tpm'
